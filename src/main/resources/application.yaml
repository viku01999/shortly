spring:
  application:
    name: shortly

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update       # Automatically creates/updates tables based on entities
    show-sql: true           # Logs SQL queries for debugging
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ✅ Redis Configuration
  redis:
    host: localhost
    port: 6379
    timeout: 60000
    lettuce:
      pool:
        max-active: 10
        max-idle: 5
        min-idle: 2

# ✅ Logging should be OUTSIDE spring
logging:
  level:
    org.springframework.data.redis: DEBUG

server:
  port: 6690